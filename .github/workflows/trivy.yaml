name: Trivy Scan

on:
  push:
    branches:
      '*'
  workflow_call:
    inputs:
      image_name:
        description: 'The name of the docker image to build'
        type: string
        required: false
        default: 'wsdatabase'
        
      dockerfile_path:
        description: 'The path of the Dockerfile'
        type: string
        required: false
        default: './Dockerfile'
        
      context:
        description: 'The path of the directory that we are going to use as a context to build the image'
        type: string
        required: false
        default: '.'      



jobs:
  
  scan:
    env:
      image_name: ${{inputs.image_name || 'wsdatabase'}}
      dockerfile_path: ${{inputs.dockerfile_path || './Dockerfile'}}
      context: ${{inputs.context || '.'}}

    permissions:
      contents: read
      security-events: write      
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build an image from Dockerfile
        run: |
          docker build -t $image_name -f $dockerfile_path $context

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.image_name }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
